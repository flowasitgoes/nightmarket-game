<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0e14"/>
      <stop offset="100%" style="stop-color:#1a1518"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0d0d12"/>
      <stop offset="70%" style="stop-color:#1c1614"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8a040;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#c45c3e;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#sky)"/>
  <rect y="180" width="800" height="220" fill="url(#ground)"/>
  <!-- Stall silhouette -->
  <rect x="60" y="200" width="180" height="120" rx="4" fill="#2a2220"/>
  <rect x="80" y="220" width="140" height="80" fill="#1a1614"/>
  <ellipse cx="150" cy="205" rx="50" ry="12" fill="url(#glow)" filter="url(#soft)"/>
  <!-- Lanterns -->
  <ellipse cx="280" cy="120" rx="22" ry="32" fill="#c45c3e" opacity="0.9"/>
  <ellipse cx="320" cy="115" rx="20" ry="28" fill="#d46a4a" opacity="0.85"/>
  <ellipse cx="500" cy="125" rx="18" ry="26" fill="#b85030" opacity="0.8"/>
  <ellipse cx="620" cy="118" rx="20" ry="30" fill="#c45c3e" opacity="0.85"/>
  <!-- Moon -->
  <circle cx="700" cy="70" r="28" fill="#f0e6d3" opacity="0.25"/>
</svg>
